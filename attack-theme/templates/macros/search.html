
<!-- overlay that gets displayed when the user clicks the search button -->
{% macro searchgui() %}
<div class="overlay search" id="search-overlay" style="display: none;">
    <div class="overlay-inner">
        <!-- text input for searching -->
        <div class="search-header">
            <div class="search-input">
                <input type="text" id="search-input" placeholder="search">
            </div>
            <div class="search-icons">
                <div class="search-parsing-icon spinner-border" style="display: none" id="search-parsing-icon"></div>
                <div class="close-search-icon" id="close-search-icon">&times;</div>
            </div>
        </div>
        <div class="search-filters" id="search-filters">
            <div class="search-filter-summary">
                <div class="search-filter-dropdown">
                    <button type="button" class="search-filter-summary-chip"
                        data-search-filter-dropdown-toggle="core" aria-controls="search-filter-dropdown-core"
                        aria-expanded="false">
                        Core Objects: <span data-search-filter-summary="group-core">All</span>
                    </button>
                    <div class="search-filter-dropdown-menu" id="search-filter-dropdown-core"
                        data-search-filter-dropdown="core" aria-hidden="true" style="display: none;">
                        <div class="search-filter-group-heading">
                            <span>Core ATT&CK Objects</span>
                            <span class="search-filter-actions">
                                <button type="button" data-search-filter-group="core"
                                    data-search-filter-group-action="all">All</button>
                                <button type="button" data-search-filter-group="core"
                                    data-search-filter-group-action="none">None</button>
                            </span>
                        </div>
                        <div class="search-filter-chips">
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="matrices">Matrices <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="tactics">Tactics <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="techniques">Techniques <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="sub-techniques">Sub-Techniques <span
                                class="search-filter-count"></span></label>
                        </div>
                    </div>
                </div>
                <div class="search-filter-dropdown">
                    <button type="button" class="search-filter-summary-chip"
                        data-search-filter-dropdown-toggle="defenses" aria-controls="search-filter-dropdown-defenses"
                        aria-expanded="false">
                        Defenses: <span data-search-filter-summary="group-defenses">All</span>
                    </button>
                    <div class="search-filter-dropdown-menu" id="search-filter-dropdown-defenses"
                        data-search-filter-dropdown="defenses" aria-hidden="true" style="display: none;">
                        <div class="search-filter-group-heading">
                            <span>Defenses</span>
                            <span class="search-filter-actions">
                                <button type="button" data-search-filter-group="defenses"
                                    data-search-filter-group-action="all">All</button>
                                <button type="button" data-search-filter-group="defenses"
                                    data-search-filter-group-action="none">None</button>
                            </span>
                        </div>
                        <div class="search-filter-chips">
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="mitigations">Mitigations <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="assets">Assets <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="detectionstrategies">Detection Strategies <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="analytics">Analytics <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="datacomponents">Data Components <span
                                class="search-filter-count"></span></label>
                        </div>
                    </div>
                </div>
                <div class="search-filter-dropdown">
                    <button type="button" class="search-filter-summary-chip"
                        data-search-filter-dropdown-toggle="cti" aria-controls="search-filter-dropdown-cti"
                        aria-expanded="false">
                        CTI: <span data-search-filter-summary="group-cti">All</span>
                    </button>
                    <div class="search-filter-dropdown-menu" id="search-filter-dropdown-cti"
                        data-search-filter-dropdown="cti" aria-hidden="true" style="display: none;">
                        <div class="search-filter-group-heading">
                            <span>CTI</span>
                            <span class="search-filter-actions">
                                <button type="button" data-search-filter-group="cti"
                                    data-search-filter-group-action="all">All</button>
                                <button type="button" data-search-filter-group="cti"
                                    data-search-filter-group-action="none">None</button>
                            </span>
                        </div>
                        <div class="search-filter-chips">
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="groups">Groups <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="software">Software <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="campaigns">Campaigns <span
                                class="search-filter-count"></span></label>
                        </div>
                    </div>
                </div>
                <div class="search-filter-dropdown">
                    <button type="button" class="search-filter-summary-chip"
                        data-search-filter-dropdown-toggle="reference" aria-controls="search-filter-dropdown-reference"
                        aria-expanded="false">
                        Reference: <span data-search-filter-summary="group-reference">All</span>
                    </button>
                    <div class="search-filter-dropdown-menu" id="search-filter-dropdown-reference"
                        data-search-filter-dropdown="reference" aria-hidden="true" style="display: none;">
                        <div class="search-filter-group-heading">
                            <span>Reference</span>
                            <span class="search-filter-actions">
                                <button type="button" data-search-filter-group="reference"
                                    data-search-filter-group-action="all">All</button>
                                <button type="button" data-search-filter-group="reference"
                                    data-search-filter-group-action="none">None</button>
                            </span>
                        </div>
                        <div class="search-filter-chips">
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-page-type="resources">Resources <span
                                class="search-filter-count"></span></label>
                        </div>
                    </div>
                </div>
                <div class="search-filter-dropdown">
                    <button type="button" class="search-filter-summary-chip"
                        data-search-filter-dropdown-toggle="domains" aria-controls="search-filter-dropdown-domains"
                        aria-expanded="false">
                        Domains: <span data-search-filter-summary="domains">All</span>
                    </button>
                    <div class="search-filter-dropdown-menu" id="search-filter-dropdown-domains"
                        data-search-filter-dropdown="domains" aria-hidden="true" style="display: none;">
                        <div class="search-filter-group-heading">
                            <span>Domains</span>
                            <span class="search-filter-actions">
                                <button type="button" data-search-filter-domain-action="all">All</button>
                                <button type="button" data-search-filter-domain-action="none">None</button>
                            </span>
                        </div>
                        <div class="search-filter-chips">
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-domain="enterprise">Enterprise <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-domain="mobile">Mobile <span
                                class="search-filter-count"></span></label>
                            <label class="search-filter-chip"><input type="checkbox"
                                data-search-filter-domain="ics">ICS <span
                                class="search-filter-count"></span></label>
                        </div>
                    </div>
                </div>
                <button type="button" class="search-filter-summary-chip search-filter-reset"
                    data-search-filter-reset style="display: none;">Reset filters</button>
            </div>
        </div>
        <!-- results and pagination controls -->
        <div id="search-body" class="search-body">
            <div id="search-results-footer" class="search-results-footer" aria-live="polite"></div>
            <div class="results" id="search-results">
                <!-- content will be appended here on search -->
            </div>
            <div id="search-results-pagination" class="search-results-pagination"></div>
        </div>
    </div>
</div>
{% endmacro %}
